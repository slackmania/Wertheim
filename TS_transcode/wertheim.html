<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WERTHEIM titkosító</title>
<style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; }
    .app { max-width: 960px; width: 100%; margin: 0 auto; padding: .5em 1em; flex: 1; display: flex; flex-direction: column; }
    h1 { color: #e94560; text-align: center; font-size: 20px; margin: .3em 0; }
    h2 { color: #e94560; font-size: 15px; margin: .5em 0 .2em; }
    .pw-row { display: flex; align-items: center; gap: .5em; margin: .3em 0; }
    .pw-row input { flex: 1; padding: .5em; border: none; border-radius: 6px; background: #16213e; color: #eee; font-family: 'Consolas', monospace; font-size: 14px; }
    .pw-row button { padding: .5em .8em; font-size: 14px; white-space: nowrap; }
    .editor-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .editor-panel textarea { flex: 1; width: 100%; padding: .5em; border: none; border-radius: 4px; background: #16213e; color: #eee; font-family: 'Consolas', monospace; font-size: 14px; resize: none; outline: none; line-height: 1.4; tab-size: 3; }
    .toolbar { display: flex; gap: .3em; flex-wrap: wrap; margin: .2em 0; }
    .toolbar button { background: #0f3460; color: #ccc; border: 1px solid #2a2a4a; padding: .35em .7em; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .toolbar button:hover { background: #1a4a80; color: #fff; }
    .toolbar button:disabled { opacity: .35; cursor: default; }
    .toolbar button:disabled:hover { background: #0f3460; color: #ccc; }
    button.prime { background: #e94560; color: #fff; border: none; padding: .5em 1.2em; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button.prime:hover { background: #c73650; }
    button.prime:disabled { opacity: .35; cursor: default; }
    button.prime:disabled:hover { background: #e94560; }
    button.sec { background: #533483; color: #fff; border: none; padding: .5em 1.2em; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button.sec:hover { background: #422a6a; }
    button.sec:disabled { opacity: .35; cursor: default; }
    button.sec:disabled:hover { background: #533483; }
    .action-row { display: flex; gap: .5em; justify-content: center; margin: .4em 0; flex-wrap: wrap; }
    .sep { border: none; border-top: 1px solid #333; margin: .5em 0; }
    .status-bar { display: flex; gap: 1em; font-size: 12px; color: #888; padding: .2em 0; justify-content: space-between; }
    .status-bar .mode { font-weight: bold; color: #4ecca3; min-width: 3em; }
    .status-bar .mode.ovr { color: #e94560; }
    .drop-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 999; align-items: center; justify-content: center; font-size: 24px; color: #4ecca3; border: 4px dashed #4ecca3; margin: 10px; border-radius: 16px; pointer-events: none; }
    .drop-overlay.show { display: flex; }
    .out { background: #0f3460; padding: .8em; border-radius: 6px; margin-top: .4em; font-size: 13px; word-break: break-all; max-height: 200px; overflow: auto; }
    .ok { color: #4ecca3; }
    .fail { color: #e94560; }
    .footer { text-align: center; color: #555; font-size: 11px; padding: .5em 0; }
    #testResults { display: none; }
    #fileInfo { font-size: 12px; color: #888; }
    .hidden { display: none !important; }

    /* ── Editor container for search highlight overlay ── */
    .editor-container { position: relative; flex: 1; min-height: 0; display: flex; }
    .editor-highlight, .editor-textarea {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        padding: .5em; border: none; border-radius: 4px;
        font-family: 'Consolas', monospace; font-size: 14px;
        line-height: 1.4; white-space: pre-wrap; word-wrap: break-word;
        overflow: auto;
    }
    .editor-highlight { background: #16213e; color: transparent; z-index: 1; pointer-events: none; }
    .editor-highlight mark { background: #e9ff70; color: #000; border-radius: 2px; }
    .editor-highlight mark.current { background: #ffb347; }
    .editor-textarea { background: transparent; color: transparent; caret-color: #eee; z-index: 2; resize: none; outline: none; tab-size: 3; }

    /* ── Search bar ── */
    .search-bar { display: flex; align-items: center; gap: .3em; margin: .2em 0; padding: .3em .5em; background: #0f3460; border-radius: 4px; }
    .search-bar input { flex: 1; background: #16213e; color: #eee; border: 1px solid #2a2a4a; border-radius: 3px; padding: .25em .5em; font-size: 13px; outline: none; }
    .search-bar input:focus { border-color: #e94560; }
    .search-bar span { color: #aaa; font-size: 12px; min-width: 3em; text-align: center; }
    .search-bar button { background: #16213e; color: #ccc; border: 1px solid #2a2a4a; padding: .2em .5em; border-radius: 3px; cursor: pointer; font-size: 12px; }
    .search-bar button:hover { background: #1a4a80; color: #fff; }

    /* ── Maximize toggle ── */
    .maximized .editor-panel-ct { display: none !important; }
    .maximized .sep-ct { display: none !important; }
    .maximized .heading-ct { display: none !important; }
</style>
</head>
<body>

<div class="app">

<h1>🔐 WERTHEIM</h1>
<p id="subtitle" style="text-align:center;color:#aaa;font-size:13px;margin:0 0 .3em;">Szöveg titkosító — minden adat a gépen marad.</p>

<hr class="sep">

<div class="pw-row" style="justify-content:flex-end;">
    <select id="langSelector" style="background:#16213e;color:#eee;border:none;border-radius:6px;padding:.35em .6em;font-size:13px;cursor:pointer;">
        <option value="hu">🇭🇺 Magyar</option>
        <option value="en">🇬🇧 English</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="ru">🇷🇺 Русский</option>
        <option value="ar">🇸🇦 العربية</option>
    </select>
</div>

<hr class="sep">

<div class="pw-row">
    <input type="password" id="password" placeholder="Jelszó megadása kötelező" spellcheck="false" autofocus>
    <button id="btnPwToggle" class="sec" style="padding:.4em .7em;font-size:13px;" title="Jelszó megjelenítése/elrejtése">👁</button>
</div>

<hr class="sep">

<div class="action-row">
    <button id="btnEncrypt" class="prime" disabled>🔒 Titkosítás</button>
    <button id="btnDecrypt" class="sec" disabled>🔓 Visszafejtés</button>
    <button id="btnSwap" class="sec" disabled>⇅ Csere</button>
    <button id="btnCopyAll" class="sec" disabled>📋 Mindent másol</button>
    <button id="btnNew" class="sec" style="background:#333;border-color:#555;">🗑 Új / Töröl</button>
</div>

<hr class="sep">

<h2 id="headingPt">📄 Szöveg</h2>
<div class="toolbar">
    <button id="btnPtOpen">📂 Megnyitás</button>
    <button id="btnPtSave">💾 Mentés</button>
    <button id="btnPtCopy">📋 Másolás</button>
    <button id="btnPtPaste">📋 Beillesztés</button>
    <button id="btnPtClear">🗑 Törlés</button>
    <button id="btnPtCleanBreaks" title="Felesleges soremelések törlése">↩ Törlés</button>
    <button id="btnPtSearch" title="Keresés (Ctrl+F)">🔍 Keresés</button>
    <button id="btnPtMaximize" title="Teljes magasság">⛶ Nagyítás</button>
    <span style="flex:1"></span>
    <span id="fileInfo"></span>
</div>
<div id="ptSearchBar" class="search-bar hidden">
    <input id="ptSearchInput" type="text" placeholder="Keresés...">
    <span id="ptSearchCount">0/0</span>
    <button id="ptSearchPrev">▲</button>
    <button id="ptSearchNext">▼</button>
    <button id="ptSearchClose">✕</button>
</div>
<div class="editor-panel">
    <div class="editor-container">
        <div class="editor-highlight" id="ptHighlight"><pre id="ptHighlightPre"><br></pre></div>
        <textarea id="plaintext" class="editor-textarea" placeholder="Ide írd a titkosítandó szöveget..." spellcheck="false"></textarea>
    </div>
</div>

<hr class="sep sep-ct">

<h2 id="headingCt" class="heading-ct">🔐 Titkosított</h2>
<div class="toolbar">
    <button id="btnCtOpen">📂 Megnyitás</button>
    <button id="btnCtSave">💾 Mentés</button>
    <button id="btnCtCopy">📋 Másolás</button>
    <button id="btnCtPaste">📋 Beillesztés</button>
    <button id="btnCtClear">🗑 Törlés</button>
</div>
<div class="editor-panel editor-panel-ct">
    <textarea id="ciphertext" placeholder="...itt jelenik meg a titkosított szöveg..." spellcheck="false"></textarea>
</div>

<div class="status-bar">
    <span class="mode" id="modeIndicator">INS</span>
    <span id="posIndicator">Sor: 1  Oszlop: 1</span>
    <span>
        <button id="btnRunTests" style="background:none;border:none;color:#888;cursor:pointer;font-size:12px;padding:0;" title="Tesztek futtatása">🧪 Tesztek</button>
        <span id="testResults" style="font-size:12px;"></span>
    </span>
</div>

<div class="footer">WERTHEIM — C++/TS port</div>

</div>

<div class="drop-overlay" id="dropOverlay">📂 Fájl elengedés a megnyitáshoz</div>

<input type="file" id="fileInput" accept=".txt,.wtx,.*" style="display:none">
<input type="file" id="fileInputCt" accept=".txt,.wtx,.*" style="display:none">

const ABC0    = "Q1Py876WF9OCczwXtIUqkjbDl+ZTuvoKNir4V/aRdxpAHg3hmSMsG2LEYB0Jne5f";
const MAX_PWD_LEN = 50;
const TARR_ROWS = 65;

// ── Base64 ───────────────────────────────────────────────────

function encode64(s) {
    let r = "", a = 0, b = 0;
    for (let i = 0; i < s.length; i++) {
        const x = s.charCodeAt(i);
        b = b * 256 + x; a += 8;
        while (a >= 6) { a -= 6; r += CODES64[(b >> a) & 0x3F]; b &= (1 << a) - 1; }
    }
    if (a > 0) r += CODES64[(b << (6 - a)) & 0x3F];
    return r;
}

function decode64(s) {
    let r = "", a = 0, b = 0;
    for (let i = 0; i < s.length; i++) {
        const x = CODES64.indexOf(s[i]);
        if (x < 0) break;
        b = b * 64 + x; a += 6;
        if (a >= 8) { a -= 8; r += String.fromCharCode((b >> a) & 0xFF); b &= (1 << a) - 1; }
    }
    return r;
}

// ── RC4 ──────────────────────────────────────────────────────

function rc4Crypt(key, data) {
    const s = new Uint8Array(256);
    for (let i = 0; i < 256; i++) s[i] = i;
    for (let i = 0, j = 0; i < 256; i++) {
        j = (j + s[i] + key[i % key.length]) & 0xFF;
        [s[i], s[j]] = [s[j], s[i]];
    }
    const out = new Uint8Array(data.length);
    let i = 0, j = 0;
    for (let k = 0; k < data.length; k++) {
        i = (i + 1) & 0xFF;
        j = (j + s[i]) & 0xFF;
        [s[i], s[j]] = [s[j], s[i]];
        out[k] = data[k] ^ s[(s[i] + s[j]) & 0xFF];
    }
    return out;
}

// ── SHA1 + RC4 ───────────────────────────────────────────────

// Encrypt: plaintext string → UTF-8 bytes → RC4 → latin1 string (for Base64)
async function besecure(mit, pw) {
    const pwBytes = new TextEncoder().encode(pw);
    const sha1 = await crypto.subtle.digest("SHA-1", pwBytes);
    const key = new Uint8Array(sha1);
    const input = new TextEncoder().encode(mit);
    const enc = rc4Crypt(key, input);
    // String.fromCharCode preserves bytes 0-255 as-is (unlike TextDecoder("latin1")
    // which maps 0x80-0x9F to Windows-1252 chars like € → broken roundtrip)
    return String.fromCharCode(...enc);
}

// Decrypt: latin1 binary string → bytes → RC4 → UTF-8 bytes → decoded text
async function kisecure(mit, pw) {
    const pwBytes = new TextEncoder().encode(pw);
    const sha1 = await crypto.subtle.digest("SHA-1", pwBytes);
    const key = new Uint8Array(sha1);
    // latin1 string → bytes (preserve 0-255, NOT UTF-8!)
    const input = new Uint8Array(mit.length);
    for (let i = 0; i < mit.length; i++) input[i] = mit.charCodeAt(i) & 0xFF;
    const dec = rc4Crypt(key, input);
    // decrypted bytes are UTF-8 → decode as text
    return new TextDecoder("utf-8").decode(dec);
}

// ── Password → key ───────────────────────────────────────────

function pw_to_kod(mit) {
    const kod = new Array(MAX_PWD_LEN).fill(0);
    const l = Math.min(mit.length, MAX_PWD_LEN);
    let wossz = 0;
    for (let t = 0; t < l; t++) {
        const pos = ABC0.indexOf(mit[t]);
        kod[t] = pos >= 0 ? pos + 1 : 0;
        wossz += kod[t];
    }
    return { kod, pwdhossz: l, pwdcode: wossz - Math.floor((Math.floor(wossz / l) / 10)) };
}

function genhinta(pwd) {
    const encoded = encode64(pwd);
    const trimmed = encoded.trim();
    const { kod, pwdhossz, pwdcode } = pw_to_kod(trimmed);
    const hintar = new Array(MAX_PWD_LEN).fill("");
    for (let t = 0; t < pwdhossz && t < MAX_PWD_LEN; t++) {
        const row = kod[t], col = trimmed.charCodeAt(t);
        if (row >= 0 && row < TARR_ROWS) hintar[t] = tarr[row][col] ?? "";
    }
    return { hintar, pwdhossz };
}

// ── Hinta substitution ───────────────────────────────────────

function bekod(mit, hintar, pwdhossz) {
    let w = mit;
    for (let z = 0; z < 2; z++) {
        let h = 0, r = "";
        for (let q0 = 0; q0 < w.length; q0++) {
            const ch = w[q0], i = ABC0.indexOf(ch);
            r += (i >= 0 && i < hintar[h].length) ? (hintar[h][i] ?? ch) : ch;
            h = (h + 1) % pwdhossz;
        }
        w = r;
    }
    return encode64(w);
}

function kikod(mit, hintar, pwdhossz) {
    let w = decode64(mit);
    for (let z = 0; z < 2; z++) {
        let h = 0, r = "";
        for (let q0 = 0; q0 < w.length; q0++) {
            const ch = w[q0], i = hintar[h].indexOf(ch);
            r += i >= 0 ? ABC0[i] : ch;
            h = (h + 1) % pwdhossz;
        }
        w = r;
    }
    return w;
}

// ── Full encode / decode ─────────────────────────────────────

async function hintabe(mit, jelszo) {
    const { hintar, pwdhossz } = genhinta(jelszo);
    const t1 = await besecure(mit, jelszo);
    return bekod(encode64(t1), hintar, pwdhossz);
}

async function hintaki(mit, jelszo) {
    const { hintar, pwdhossz } = genhinta(jelszo);
    return kisecure(decode64(kikod(mit, hintar, pwdhossz)), jelszo);
}

// ── Password gate ─────────────────────────────────────────────

function updateButtons() {
    const hasPw = $("password").value.trim().length > 0;
    ["btnEncrypt","btnDecrypt","btnSwap","btnCopyAll"].forEach(id => {
        $(id).disabled = !hasPw;
    });
}

$("password").addEventListener("input", updateButtons);
$("password").addEventListener("keydown", e => { if (e.key === "Enter") enc(); });

// ── Password show/hide ────────────────────────────────────────

$("btnPwToggle").addEventListener("click", () => {
    const pw = $("password");
    if (pw.type === "password") { pw.type = "text"; $("btnPwToggle").textContent = "🙈"; }
    else { pw.type = "password"; $("btnPwToggle").textContent = "👁"; }
});

// ── Encrypt / Decrypt / Swap ─────────────────────────────────

async function enc() {
    try {
        const pw = $("password").value.trim();
        if (!pw) return;
        $("ciphertext").value = await hintabe($("plaintext").value, pw);
    } catch (e) { $("ciphertext").value = LANG[currentLang].error + " " + e.message; }
}
async function dec() {
    try {
        const pw = $("password").value.trim();
        if (!pw) return;
        $("plaintext").value = await hintaki($("ciphertext").value, pw);
        syncHighlight();
    } catch (e) { $("plaintext").value = LANG[currentLang].error + " " + e.message; syncHighlight(); }
}
function swap() {
    const t = $("plaintext").value;
    $("plaintext").value = $("ciphertext").value;
    $("ciphertext").value = t;
}

$("btnEncrypt").addEventListener("click", enc);
$("btnDecrypt").addEventListener("click", dec);
$("btnSwap").addEventListener("click", swap);

// ── Copy All ──────────────────────────────────────────────────

async function copyAll() {
    const t = LANG[currentLang];
    const pt = $("plaintext").value;
    const ct = $("ciphertext").value;
    const all = (pt ? "── " + t.headingPt.replace(/[^a-zA-ZáéíóöőúüűÁÉÍÓÖŐÚÜŰ ]/g,"").trim() + " ──\n" + pt : "") +
                (pt && ct ? "\n\n" : "") +
                (ct ? "── " + t.headingCt.replace(/[^a-zA-ZáéíóöőúüűÁÉÍÓÖŐÚÜŰ ]/g,"").trim() + " ──\n" + ct : "");
    if (!all) return;
    try {
        await navigator.clipboard.writeText(all);
        const btn = $("btnCopyAll");
        const orig = btn.textContent;
        btn.textContent = t.copyAllDone;
        setTimeout(() => btn.textContent = orig, 1200);
    } catch (e) { /* silent */ }
}
$("btnCopyAll").addEventListener("click", copyAll);

// ── New / Clear ───────────────────────────────────────────────

$("btnNew").addEventListener("click", () => {
    if ($("plaintext").value || $("ciphertext").value) {
        if (!confirm(LANG[currentLang].newConfirm)) return;
    }
    $("plaintext").value = "";
    $("ciphertext").value = "";
    updatePos($("plaintext"));
    $("fileInfo").textContent = "";
});

// ── Text editing helpers ─────────────────────────────────────

let overwriteMode = false;

document.addEventListener("keydown", e => {
    const ta = e.target;
    if (ta.tagName !== "TEXTAREA") return;

    // Insert toggle
    if (e.key === "Insert") {
        e.preventDefault();
        overwriteMode = !overwriteMode;
        const mi = $("modeIndicator");
        mi.textContent = overwriteMode ? "OVR" : "INS";
        mi.className = "mode" + (overwriteMode ? " ovr" : "");
        return;
    }

    // Tab → 3 spaces
    if (e.key === "Tab") {
        e.preventDefault();
        const start = ta.selectionStart, end = ta.selectionEnd;
        ta.value = ta.value.substring(0, start) + "   " + ta.value.substring(end);
        ta.selectionStart = ta.selectionEnd = start + 3;
        updatePos(ta);
        return;
    }

    // Overwrite: select next char before typing
    if (overwriteMode && e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
        const start = ta.selectionStart, end = ta.selectionEnd;
        if (start === end && start < ta.value.length) {
            ta.selectionEnd = start + 1;
        }
    }
});

// Position tracking
function updatePos(ta) {
    const val = ta.value;
    const pos = ta.selectionStart;
    const before = val.substring(0, pos);
    const line = (before.match(/\n/g) || []).length + 1;
    const lastNl = before.lastIndexOf("\n");
    const col = pos - lastNl;
    $("posIndicator").textContent = LANG[currentLang].posFormat.replace("{line}", line).replace("{col}", col);
}

["plaintext", "ciphertext"].forEach(id => {
    $(id).addEventListener("click", () => updatePos($(id)));
    $(id).addEventListener("keyup", () => updatePos($(id)));
    $(id).addEventListener("select", () => updatePos($(id)));
    $(id).addEventListener("focus", () => updatePos($(id)));
});

// ── File: Open Plaintext ──────────────────────────────────────

$("btnPtOpen").addEventListener("click", () => $("fileInput").click());
$("fileInput").addEventListener("change", async e => {
    const file = e.target.files[0];
    if (!file) return;
    try {
        const text = await file.text();
        $("plaintext").value = text;
        $("fileInfo").textContent = LANG[currentLang].filePrefix + " " + file.name + " (" + file.size + " bájt)";
        updatePos($("plaintext"));
        syncHighlight();
    } catch (err) { $("plaintext").value = LANG[currentLang].error + " " + err.message; syncHighlight(); }
    e.target.value = "";
});

// ── File: Open Ciphertext (auto-decode .wtx) ─────────────────

$("btnCtOpen").addEventListener("click", () => $("fileInputCt").click());
$("fileInputCt").addEventListener("change", async e => {
    const file = e.target.files[0];
    if (!file) return;
    try {
        const text = await file.text();
        $("ciphertext").value = text;
        $("fileInfo").textContent = LANG[currentLang].filePrefix + " " + file.name + " (" + file.size + " bájt)";
        // Auto-decode .wtx if password is set
        if (file.name.toLowerCase().endsWith(".wtx")) {
            const pw = $("password").value.trim();
            if (pw) {
                try {
                    const decrypted = await hintaki(text, pw);
                    $("plaintext").value = decrypted;
                    syncHighlight();
                } catch (_) { /* keep ciphertext visible */ }
            }
        }
        updatePos($("ciphertext"));
    } catch (err) { $("ciphertext").value = LANG[currentLang].error + " " + err.message; }
    e.target.value = "";
});

// ── File: Save (filename prompt) ──────────────────────────────

function saveFile(content, suggestedName) {
    const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = suggestedName || `wertheim_${Date.now()}.txt`;
    a.click();
    URL.revokeObjectURL(url);
}

$("btnPtSave").addEventListener("click", () => {
    const t = LANG[currentLang];
    const text = $("plaintext").value;
    if (!text) return;
    const name = prompt(t.savePtPrompt, t.saveDefaultPt + "_" + Date.now() + ".txt");
    if (name) saveFile(text, name);
});
$("btnCtSave").addEventListener("click", () => {
    const t = LANG[currentLang];
    const text = $("ciphertext").value;
    if (!text) return;
    let name = prompt(t.saveCtPrompt, t.saveDefaultCt + "_" + Date.now() + ".wtx");
    if (name) {
        if (!name.toLowerCase().endsWith(".wtx")) name += ".wtx";
        saveFile(text, name);
    }
});

// ── Clipboard: Copy ───────────────────────────────────────────

async function copyText(text, btn) {
    const t = LANG[currentLang];
    try {
        await navigator.clipboard.writeText(text);
        const orig = btn.textContent;
        btn.textContent = t.copied;
        setTimeout(() => btn.textContent = orig, 1200);
    } catch (e) { btn.textContent = t.error.replace(/[^a-zA-ZáéíóöőúüűÁÉÍÓÖŐÚÜŰ! ]/g,"").trim() || "Error"; }
}

$("btnPtCopy").addEventListener("click", () => copyText($("plaintext").value, $("btnPtCopy")));
$("btnCtCopy").addEventListener("click", () => copyText($("ciphertext").value, $("btnCtCopy")));

// ── Clipboard: Paste ──────────────────────────────────────────

async function pasteText(ta) {
    try {
        const text = await navigator.clipboard.readText();
        const start = ta.selectionStart, end = ta.selectionEnd;
        ta.value = ta.value.substring(0, start) + text + ta.value.substring(end);
        ta.selectionStart = ta.selectionEnd = start + text.length;
        updatePos(ta);
        if (ta.id === "plaintext") syncHighlight();
    } catch (e) { /* silent */ }
}

$("btnPtPaste").addEventListener("click", () => pasteText($("plaintext")));
$("btnCtPaste").addEventListener("click", () => pasteText($("ciphertext")));

// ── Clear ─────────────────────────────────────────────────────

$("btnPtClear").addEventListener("click", () => { $("plaintext").value = ""; updatePos($("plaintext")); syncHighlight(); });
$("btnCtClear").addEventListener("click", () => { $("ciphertext").value = ""; updatePos($("ciphertext")); });

// ── Maximize toggle ──────────────────────────────────────────

let ptMaximized = false;
$("btnPtMaximize").addEventListener("click", () => {
    ptMaximized = !ptMaximized;
    document.body.classList.toggle("maximized", ptMaximized);
});

// ── Search toggle ──────────────────────────────────────────────

$("btnPtSearch").addEventListener("click", () => {
    $("ptSearchBar").classList.toggle("hidden");
    if (!$("ptSearchBar").classList.contains("hidden")) {
        $("ptSearchInput").focus();
        $("ptSearchInput").select();
    }
});

// ── Clean breaks ─────────────────────────────────────────────

$("btnPtCleanBreaks").addEventListener("click", () => {
    const ta = $("plaintext");
    let t = ta.value.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
    t = t.replace(/\n{3,}/g, "\n\n");
    ta.value = t;
    updatePos(ta);
    syncHighlight();
});

// ── Search with highlight overlay ────────────────────────────

let ptMatches = [];
let ptMatchIdx = -1;

function syncHighlight() {
    const ta = $("plaintext");
    const hl = $("ptHighlightPre");
    const text = ta.value;
    const query = $("ptSearchInput").value;
    if (!query || text.indexOf(query) === -1) {
        hl.textContent = text || "\n";
        ptMatches = [];
        ptMatchIdx = -1;
        $("ptSearchCount").textContent = "0/0";
        return;
    }
    ptMatches = [];
    let idx = 0, start = 0;
    const lowerText = text.toLowerCase();
    const lowerQ = query.toLowerCase();
    while ((idx = lowerText.indexOf(lowerQ, start)) !== -1) {
        ptMatches.push(idx);
        start = idx + query.length;
    }
    let html = "";
    let last = 0;
    const ci = ptMatchIdx >= 0 && ptMatchIdx < ptMatches.length ? ptMatches[ptMatchIdx] : -1;
    for (const m of ptMatches) {
        html += escHtml(text.substring(last, m));
        html += m === ci ? "<mark class=\"current\">" : "<mark>";
        html += escHtml(text.substring(m, m + query.length));
        html += "</mark>";
        last = m + query.length;
    }
    html += escHtml(text.substring(last));
    hl.innerHTML = html || "<br>";
    const n = ptMatchIdx >= 0 ? ptMatchIdx + 1 : 0;
    const total = ptMatches.length;
    $("ptSearchCount").textContent = LANG[currentLang].searchCount.replace("{n}", n).replace("{total}", total);
}

function escHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function scrollHighlight() {
    const ta = $("plaintext");
    const hl = $("ptHighlight");
    hl.scrollTop = ta.scrollTop;
    hl.scrollLeft = ta.scrollLeft;
}

$("plaintext").addEventListener("input", () => { syncHighlight(); updatePos($("plaintext")); });
$("plaintext").addEventListener("scroll", scrollHighlight);

$("ptSearchInput").addEventListener("input", () => {
    ptMatchIdx = -1;
    syncHighlight();
});

$("ptSearchInput").addEventListener("keydown", e => {
    if (e.key === "Enter") {
        e.preventDefault();
        if (e.shiftKey) $("ptSearchPrev").click();
        else $("ptSearchNext").click();
    }
    if (e.key === "Escape") { $("ptSearchClose").click(); }
});

$("ptSearchNext").addEventListener("click", () => {
    if (ptMatches.length === 0) return;
    ptMatchIdx = (ptMatchIdx + 1) % ptMatches.length;
    const ta = $("plaintext");
    const pos = ptMatches[ptMatchIdx];
    ta.focus();
    ta.setSelectionRange(pos, pos + $("ptSearchInput").value.length);
    syncHighlight();
});

$("ptSearchPrev").addEventListener("click", () => {
    if (ptMatches.length === 0) return;
    ptMatchIdx = (ptMatchIdx - 1 + ptMatches.length) % ptMatches.length;
    const ta = $("plaintext");
    const pos = ptMatches[ptMatchIdx];
    ta.focus();
    ta.setSelectionRange(pos, pos + $("ptSearchInput").value.length);
    syncHighlight();
});

$("ptSearchClose").addEventListener("click", () => {
    $("ptSearchBar").classList.add("hidden");
    $("ptSearchInput").value = "";
    ptMatches = [];
    ptMatchIdx = -1;
    syncHighlight();
    $("plaintext").focus();
});

// Ctrl+F to open search
document.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "f") {
        e.preventDefault();
        $("ptSearchBar").classList.remove("hidden");
        $("ptSearchInput").focus();
        $("ptSearchInput").select();
    }
});

// ── Drag & drop ───────────────────────────────────────────────

let dragCounter = 0;

document.addEventListener("dragenter", e => {
    e.preventDefault();
    dragCounter++;
    $("dropOverlay").classList.add("show");
});
document.addEventListener("dragleave", e => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; $("dropOverlay").classList.remove("show"); }
});
document.addEventListener("dragover", e => e.preventDefault());
document.addEventListener("drop", async e => {
    e.preventDefault();
    dragCounter = 0;
    $("dropOverlay").classList.remove("show");
    const file = e.dataTransfer.files[0];
    if (!file) return;
    try {
    const text = await file.text();
    // Check extension: .wtx → ciphertext, else → plaintext
    if (file.name.toLowerCase().endsWith(".wtx")) {
        $("ciphertext").value = text;
        const pw = $("password").value.trim();
        if (pw) {
            try { $("plaintext").value = await hintaki(text, pw); syncHighlight(); } catch (_) {}
        }
    } else {
        $("plaintext").value = text;
        syncHighlight();
    }
        $("fileInfo").textContent = LANG[currentLang].filePrefix + " " + file.name + " (" + file.size + " bájt)";
    } catch (err) { /* silent */ }
});

// ── Tests ─────────────────────────────────────────────────────

$("btnRunTests").addEventListener("click", async () => {
    let html = "", pass = 0, fail = 0;
    const T = async (name, fn) => {
        try { await fn(); html += `<span class="ok">✓ ${name}</span><br>`; pass++; }
        catch (e) { html += `<span class="fail">✗ ${name}: ${e.message}</span><br>`; fail++; }
    };

    await T("Base64 round‑trip", async () => {
        const o = "Hello World!", e = encode64(o), d = decode64(e);
        if (o !== d) throw new Error("mismatch");
    });
    await T("Basic encrypt/decrypt", async () => {
        const p = "Hello World!", w = "test", e = await hintabe(p, w), d = await hintaki(e, w);
        if (p !== d) throw new Error("mismatch");
    });
    await T("Hungarian UTF‑8", async () => {
        const p = "Árvíztűrő tükörfúrógép", w = "prutty", e = await hintabe(p, w), d = await hintaki(e, w);
        if (p !== d) throw new Error("mismatch");
    });
    await T("Long text (1000 chars)", async () => {
        const p = "x".repeat(1000), w = "pw", e = await hintabe(p, w), d = await hintaki(e, w);
        if (p !== d) throw new Error("mismatch");
    });
    await T("Wrong password → garbled", async () => {
        const p = "secret", w1 = "good", w2 = "bad", e = await hintabe(p, w1), d = await hintaki(e, w2);
        if (p === d) throw new Error("wrong pw should not match");
    });

    $("testResults").style.display = "inline";
    $("testResults").innerHTML = html + ` <b>${pass}/${pass+fail}</b>`;
    setTimeout(() => { $("testResults").style.display = "none"; }, 8000);
});

syncHighlight();
